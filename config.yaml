# LLM Provider
openrouter:
  api_key_env: "OPENROUTER_API_KEY"
  base_url: "https://openrouter.ai/api/v1"

# Model mapping (friendly name -> OpenRouter slug)
models:
  grok-4.1-fast: "x-ai/grok-4.1-fast"
  deepseek-v3.2: "deepseek/deepseek-v3.2"
  glm-4.7-flash: "z-ai/glm-4.7-flash"

# Agent -> model assignment
agents:
  ideator:
    model: grok-4.1-fast
    temperature: 0.85
  recombiner:
    model: deepseek-v3.2
    temperature: 0.60
  gatekeeper:
    model: deepseek-v3.2
    temperature: 0.20
  principles_judge:
    model: deepseek-v3.2
    temperature: 0.18
  pre_ranker:
    model: deepseek-v3.2
    temperature: 0.20
  dsr_designer:
    model: deepseek-v3.2
    temperature: 0.25
  ranker:
    model: deepseek-v3.2
    temperature: 0.15
  schema_repair:
    model: glm-4.7-flash
    temperature: 0.0
  angel_rescue:
    model: grok-4.1-fast
    temperature: 0.70

# Embedding (for diversity selection)
embedding:
  provider: openrouter
  model: "openai/text-embedding-3-small"
  fallback: tfidf

# Gatekeeper thresholds (strict)
gatekeeper:
  q1_kill_threshold: 6
  q2_kill_threshold: 3
  q3_kill_threshold: 3

# Pipeline defaults
pipeline:
  domain: "productivity_android"
  android_profile: "mid-range Android, 4GB RAM, sometimes offline, limited background permissions"
  n_raw: 30
  top_k: 10
  min_hybrids: 5
  max_retries: 1
  seed: 42

# User profile (optional -- pipeline works without it)
user_profile:
  skills: ["Android development", "Kotlin", "Python", "LangGraph", "mobile UX"]
  stack: ["Python", "LangGraph", "OpenRouter", "Pydantic", "Kotlin", "Android SDK"]
  past_projects: ["Android apps", "mobile productivity tools", "LLM agent pipelines"]

# Market search for pre-ranker monetization scoring
search:
  enabled: true
  provider: duckduckgo
  max_results: 3
  timeout_seconds: 10

# Memory (cross-run duplicate detection)
memory:
  similarity_threshold: 0.90
  history_dir: "./outputs/global_history"

# Output
output:
  dir: "./outputs"
